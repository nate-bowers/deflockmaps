# Local Valhalla routing engine for the DeFlock-avoidance demo.
#
# Production: uses the prebuilt Bay Area image (tiles baked in) — `docker compose
# up -d` pulls it and serves immediately, no build, no mounted tile files.
#
# The image is built from the Bay Area OSM extract; to rebuild it from source see
# scripts/ and the gis-ops/docker-valhalla base image.
services:
  valhalla:
    image: ghcr.io/nate-bowers/deflock-valhalla:latest
    container_name: deflock-valhalla
    ports:
      - "8002:8002"
    restart: unless-stopped
